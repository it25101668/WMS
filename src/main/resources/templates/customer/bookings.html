<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>My Bookings – Wedding Management System</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<div class="sidebar" style="background: linear-gradient(180deg, #880E4F 0%, #4A148C 100%);">
    <div class="sidebar-brand">💒 My Wedding Portal</div>
    <div class="sidebar-section-label">My Account</div>
    <a href="/customer/dashboard" class="nav-link">🏠 Dashboard</a>
    <a href="/customer/bookings"  class="nav-link active">📅 My Bookings</a>
    <a href="/customer/profile"   class="nav-link">⚙️ My Profile</a>
    <div class="sidebar-footer"><a href="/logout" class="nav-link">🚪 Logout</a></div>
</div>
<div class="main-content">
    <div class="page-header">
        <h1>My Booking History</h1>
        <a href="/customer/dashboard" class="btn btn-outline">← Dashboard</a>
    </div>

    <div class="section-card">
        <div class="section-header">
            <h2>All Bookings</h2>
            <span class="badge badge-pink" th:text="${bookings.size()} + ' Bookings'"></span>
        </div>
        <div th:if="${#lists.isEmpty(bookings)}">
            <div class="empty-state">
                <div class="empty-icon">💍</div>
                <p>You have no bookings yet. Contact our team to get started!</p>
            </div>
        </div>
        <table class="data-table" th:unless="${#lists.isEmpty(bookings)}">
            <thead>
                <tr>
                    <th>#</th>
                    <th>Package</th>
                    <th>Event Date</th>
                    <th>Venue</th>
                    <th>Guests</th>
                    <th>Total</th>
                    <th>Status</th>
                    <th>Notes</th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="booking, stat : ${bookings}">
                    <td th:text="${stat.count}"></td>
                    <td><strong th:text="${booking.weddingPackage?.name ?: 'Custom Booking'}"></strong></td>
                    <td th:text="${booking.eventDate}"></td>
                    <td th:text="${booking.venue ?: '-'}"></td>
                    <td th:text="${booking.guestCount ?: '-'}"></td>
                    <td><strong th:text="'Rs. ' + ${#numbers.formatDecimal(booking.totalAmount ?: 0, 1, 'COMMA', 2, 'POINT')}"></strong></td>
                    <td>
                        <span class="badge badge-warning" th:if="${booking.status == 'Pending'}">Pending</span>
                        <span class="badge badge-success" th:if="${booking.status == 'Confirmed'}">Confirmed</span>
                        <span class="badge badge-info"    th:if="${booking.status == 'Completed'}">Completed</span>
                        <span class="badge badge-danger"  th:if="${booking.status == 'Cancelled'}">Cancelled</span>
                    </td>
                    <td style="font-size:0.78rem; color:#888; max-width:160px;" th:text="${booking.notes ?: '-'}"></td>
                </tr>
            </tbody>
        </table>
    </div>
</div>
</body>
</html>
