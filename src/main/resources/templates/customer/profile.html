<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>My Profile – Wedding Management System</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<div class="sidebar" style="background: linear-gradient(180deg, #880E4F 0%, #4A148C 100%);">
    <div class="sidebar-brand">💒 My Wedding Portal</div>
    <div class="sidebar-section-label">My Account</div>
    <a href="/customer/dashboard" class="nav-link">🏠 Dashboard</a>
    <a href="/customer/bookings"  class="nav-link">📅 My Bookings</a>
    <a href="/customer/profile"   class="nav-link active">⚙️ My Profile</a>
    <div class="sidebar-footer"><a href="/logout" class="nav-link">🚪 Logout</a></div>
</div>
<div class="main-content">
    <div class="page-header">
        <h1>My Profile</h1>
        <a href="/customer/dashboard" class="btn btn-outline">← Dashboard</a>
    </div>
    <div th:if="${successMsg}" class="alert alert-success"><span>✅</span><span th:text="${successMsg}"></span></div>
    <div th:if="${errorMsg}"   class="alert alert-danger"><span>⚠️</span><span th:text="${errorMsg}"></span></div>

    <div class="section-card" style="max-width:650px;">
        <div style="display:flex; align-items:center; gap:20px; margin-bottom:28px;">
            <div style="width:72px; height:72px; border-radius:50%; background:linear-gradient(135deg,#880E4F,#4A148C); display:flex; align-items:center; justify-content:center; font-size:1.8rem; border:3px solid var(--shining-pink); box-shadow:0 0 12px var(--shining-pink);">💒</div>
            <div>
                <h3 style="font-family:'Playfair Display',serif; color:var(--dark-pink-shine);" th:text="${customer.fullName}"></h3>
                <p style="color:#888; font-size:0.85rem;" th:text="${customer.email}"></p>
                <span class="badge badge-pink">Customer</span>
            </div>
        </div>
        <form action="/customer/profile/update" method="post">
            <div class="form-grid">
                <div class="form-group">
                    <label>First Name *</label>
                    <input type="text" name="firstName" th:value="${customer.firstName}" required>
                </div>
                <div class="form-group">
                    <label>Last Name *</label>
                    <input type="text" name="lastName" th:value="${customer.lastName}" required>
                </div>
                <div class="form-group">
                    <label>Email (read-only)</label>
                    <input type="email" th:value="${customer.email}" readonly style="background:#f5f5f5; cursor:not-allowed;">
                </div>
                <div class="form-group">
                    <label>Phone</label>
                    <input type="tel" name="phone" th:value="${customer.phone}" placeholder="+94 77 xxx xxxx">
                </div>
                <div class="form-group">
                    <label>New Password</label>
                    <input type="password" name="password" placeholder="Leave blank to keep current">
                </div>
                <div class="form-group full-width">
                    <label>Address</label>
                    <input type="text" name="address" th:value="${customer.address}" placeholder="Your address">
                </div>
            </div>
            <div class="form-actions">
                <button type="submit" class="btn">💾 Update Profile</button>
            </div>
        </form>
    </div>
</div>
</body>
</html>
