<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Customer Login – Wedding Management System</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body style="overflow:auto;">
<div class="login-wrapper">
    <div class="login-card">
        <div class="login-logo">💒</div>
        <h2>Customer Login</h2>
        <p>Sign in to manage your wedding bookings</p>

        <div th:if="${errorMsg}"   class="alert alert-danger"><span>⚠️</span><span th:text="${errorMsg}"></span></div>
        <div th:if="${successMsg}" class="alert alert-success"><span>✅</span><span th:text="${successMsg}"></span></div>

        <form action="/customer/login" method="post">
            <div class="form-group" style="margin-bottom:16px;">
                <label>Email Address</label>
                <input type="email" name="email" placeholder="your@email.com" required>
            </div>
            <div class="form-group" style="margin-bottom:24px;">
                <label>Password</label>
                <input type="password" name="password" placeholder="Your password" required>
            </div>
            <button type="submit" class="btn" style="width:100%; justify-content:center;">💒 Sign In</button>
        </form>
        <div style="margin-top:18px; text-align:center; font-size:0.82rem; color:#888;">
            No account? <a th:href="@{/customer/register}" style="color:var(--primary-pink); font-weight:600;">Register here</a>
        </div>
    </div>
</div>
</body>
</html>
