<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Report Details – WMS Admin</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<div class="sidebar">
    <div class="sidebar-brand">💍 Wedding Planning System</div>
    <div class="sidebar-section-label">Management</div>
    <a href="/admin/users"    class="nav-link">👤 User Management</a>
    <a href="/admin/vendors"  class="nav-link">🏪 Vendor Management</a>
    <a href="/admin/packages" class="nav-link">📦 Package Management</a>
    <a href="/admin/bookings" class="nav-link">📅 Booking System</a>
    <a href="/admin/reports"  class="nav-link active">📊 Report Management</a>
    <div class="sidebar-section-label">Account</div>
    <a href="/admin/profile"  class="nav-link">⚙️ Profile</a>
    <div class="sidebar-footer"><a href="/logout" class="nav-link">🚪 Logout</a></div>
</div>
<div class="main-content">
    <div class="page-header">
        <h1 th:text="${report.title}">Report Details</h1>
        <div style="display:flex;gap:10px;">
            <a href="/admin/reports" class="btn btn-outline">← Back</a>
            <a th:href="@{/admin/reports/delete/{id}(id=${report.id})}" class="btn btn-danger"
               onclick="return confirm('Delete this report?')">🗑️ Delete</a>
        </div>
    </div>
    <div class="section-card" style="max-width:800px;">
        <div style="display:flex; gap:16px; align-items:center; margin-bottom:24px; flex-wrap:wrap;">
            <span class="badge badge-info"    th:if="${report.type == 'Booking'}"  th:text="${report.type}"></span>
            <span class="badge badge-success" th:if="${report.type == 'Revenue'}"  th:text="${report.type}"></span>
            <span class="badge badge-purple"  th:if="${report.type == 'Customer'}" th:text="${report.type}"></span>
            <span class="badge badge-pink"    th:if="${report.type == 'Vendor'}"   th:text="${report.type}"></span>
            <span style="font-size:0.8rem; color:#888;">Generated by <strong th:text="${report.generatedBy ?: 'Admin'}">Admin</strong></span>
            <span style="font-size:0.8rem; color:#888;" th:text="'on ' + ${#temporals.format(report.generatedDate, 'dd MMM yyyy, HH:mm')}"></span>
        </div>
        <div style="background:#fafafa; border-radius:14px; padding:24px; border:1px solid var(--light-pink); white-space:pre-wrap; font-size:0.88rem; line-height:1.7; color:#444;"
             th:text="${report.content ?: 'No content provided.'}"></div>
    </div>
</div>
</body>
</html>
