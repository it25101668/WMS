<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login – Wedding Management System</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body style="overflow:auto;">
<div class="login-wrapper">
    <div class="login-card">
        <div class="login-logo">💍</div>
        <h2>Admin Login</h2>
        <p>Wedding Management System</p>

        <div th:if="${errorMsg}" class="alert alert-danger">
            <span>⚠️</span> <span th:text="${errorMsg}"></span>
        </div>
        <div th:if="${successMsg}" class="alert alert-success">
            <span>✅</span> <span th:text="${successMsg}"></span>
        </div>

        <form action="/login" method="post">
            <div class="form-group" style="margin-bottom:16px;">
                <label>Username</label>
                <input type="text" name="username" placeholder="Enter admin username" required>
            </div>
            <div class="form-group" style="margin-bottom:24px;">
                <label>Password</label>
                <input type="password" name="password" placeholder="Enter password" required>
            </div>
            <button type="submit" class="btn" style="width:100%; justify-content:center;">🔐 Sign In</button>
        </form>
    </div>
</div>
</body>
</html>
