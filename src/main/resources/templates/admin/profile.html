<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Admin Profile – WMS Admin</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<div class="sidebar">
    <div class="sidebar-brand">💍 Wedding Planning System</div>
    <div class="sidebar-section-label">Management</div>
    <a href="/admin/dashboard" class="nav-link">🏠 Dashboard</a>
    <a href="/admin/users"    class="nav-link">👤 User Management</a>
    <a href="/admin/vendors"  class="nav-link">🏪 Vendor Management</a>
    <a href="/admin/packages" class="nav-link">📦 Package Management</a>
    <a href="/admin/bookings" class="nav-link">📅 Booking System</a>
    <a href="/admin/reports"  class="nav-link">📊 Report Management</a>
    <div class="sidebar-section-label">Account</div>
    <a href="/admin/profile"  class="nav-link active">⚙️ Profile</a>
    <div class="sidebar-footer"><a href="/logout" class="nav-link">🚪 Logout</a></div>
</div>
<div class="main-content">
    <div class="page-header">
        <h1>Admin Profile</h1>
        <a href="/admin/dashboard" class="btn btn-outline">← Dashboard</a>
    </div>
    <div th:if="${successMsg}" class="alert alert-success"><span>✅</span><span th:text="${successMsg}"></span></div>
    <div th:if="${errorMsg}"   class="alert alert-danger"><span>⚠️</span><span th:text="${errorMsg}"></span></div>

    <div class="section-card" style="max-width:700px;">
        <div style="display:flex; align-items:center; gap:24px; margin-bottom:30px;">
            <div style="width:80px; height:80px; border-radius:50%; background:linear-gradient(135deg,var(--primary-pink),var(--shining-pink)); display:flex; align-items:center; justify-content:center; font-size:2rem; border:3px solid var(--shining-pink); box-shadow:0 0 15px var(--shining-pink);">👑</div>
            <div>
                <h3 style="font-family:'Playfair Display',serif; color:var(--dark-pink-shine);" th:text="${adminUser?.fullName ?: adminUser?.username}">Administrator</h3>
                <p style="color:#888; font-size:0.85rem;" th:text="${adminUser?.email}">admin@wms.com</p>
                <span class="badge badge-purple">ADMIN</span>
            </div>
        </div>
        <form action="/admin/profile/update" method="post" th:object="${adminUser}">
            <div class="form-grid">
                <div class="form-group">
                    <label>Full Name</label>
                    <input type="text" name="fullName" th:value="${adminUser?.fullName}" placeholder="Your full name">
                </div>
                <div class="form-group">
                    <label>Username</label>
                    <input type="text" name="username" th:value="${adminUser?.username}" placeholder="Username" required>
                </div>
                <div class="form-group">
                    <label>Email</label>
                    <input type="email" name="email" th:value="${adminUser?.email}" placeholder="Email address" required>
                </div>
                <div class="form-group">
                    <label>Phone</label>
                    <input type="tel" name="phone" th:value="${adminUser?.phone}" placeholder="Phone number">
                </div>
                <div class="form-group">
                    <label>New Password</label>
                    <input type="password" name="password" placeholder="Leave blank to keep current">
                </div>
                <div class="form-group">
                    <label>Role</label>
                    <input type="text" value="ADMIN" name="role" readonly style="background:#f5f5f5; cursor:not-allowed;">
                </div>
            </div>
            <div class="form-actions">
                <button type="submit" class="btn">💾 Update Profile</button>
            </div>
        </form>
    </div>
</div>
</body>
</html>
