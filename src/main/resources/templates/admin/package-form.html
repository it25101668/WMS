<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title th:text="${formTitle} + ' – WMS Admin'">Package Form</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<div class="sidebar">
    <div class="sidebar-brand">💍 Wedding Planning System</div>
    <div class="sidebar-section-label">Management</div>
    <a href="/admin/users"    class="nav-link">👤 User Management</a>
    <a href="/admin/vendors"  class="nav-link">🏪 Vendor Management</a>
    <a href="/admin/packages" class="nav-link active">📦 Package Management</a>
    <a href="/admin/bookings" class="nav-link">📅 Booking System</a>
    <a href="/admin/reports"  class="nav-link">📊 Report Management</a>
    <div class="sidebar-section-label">Account</div>
    <a href="/admin/profile"  class="nav-link">⚙️ Profile</a>
    <div class="sidebar-footer"><a href="/logout" class="nav-link">🚪 Logout</a></div>
</div>
<div class="main-content">
    <div class="page-header">
        <h1 th:text="${formTitle}">Package Form</h1>
        <a href="/admin/packages" class="btn btn-outline">← Back to Packages</a>
    </div>
    <div class="section-card">
        <div class="form-container">
            <form th:action="${formAction}" th:object="${pkg}" method="post">
                <div class="form-grid">
                    <div class="form-group">
                        <label>Package Name *</label>
                        <input type="text" th:field="*{name}" placeholder="e.g. Royal Gold Package" required>
                    </div>
                    <div class="form-group">
                        <label>Price (LKR) *</label>
                        <input type="number" step="0.01" th:field="*{price}" placeholder="e.g. 250000.00" required>
                    </div>
                    <div class="form-group">
                        <label>Duration</label>
                        <input type="text" th:field="*{duration}" placeholder="e.g. 1 Day, 2 Days">
                    </div>
                    <div class="form-group">
                        <label>Max Guests</label>
                        <input type="number" th:field="*{maxGuests}" placeholder="e.g. 200">
                    </div>
                    <div class="form-group">
                        <label>Location</label>
                        <input type="text" th:field="*{location}" placeholder="e.g. Colombo">
                    </div>
                    <div class="form-group">
                        <label>Status</label>
                        <select th:field="*{status}">
                            <option value="Available">Available</option>
                            <option value="Unavailable">Unavailable</option>
                        </select>
                    </div>
                    <div class="form-group full-width">
                        <label>Description</label>
                        <textarea th:field="*{description}" placeholder="Package overview..."></textarea>
                    </div>
                    <div class="form-group full-width">
                        <label>Inclusions (comma-separated)</label>
                        <textarea th:field="*{inclusions}" placeholder="Catering, Photography, Decoration, DJ, ..."></textarea>
                    </div>
                </div>
                <div class="form-actions">
                    <a href="/admin/packages" class="btn btn-secondary">Cancel</a>
                    <button type="submit" class="btn">💾 Save Package</button>
                </div>
            </form>
        </div>
    </div>
</div>
</body>
</html>
